<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運貯めアプリ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #FFEB3B;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            color: #FF1744;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff;
            margin-bottom: 20px;
        }
        .un-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 360px;
        }
        .un-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .un-circle {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #ffb74d, #ff9800);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d32f2f;
            font-size: 42px;
            font-weight: bold;
        }
        .un-date {
            margin-top: 5px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        /* リセットボタンのスタイル */
        .clear-btn {
            margin-top: 30px;
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">今月の運</div>
    <div class="un-grid" id="unGrid"></div>
    
    <button class="clear-btn" onclick="clearUn()">データをリセット</button>

<script>
    const unGrid = document.getElementById('unGrid');
    
    // スマホに保存されている過去のデータを読み込む
    let unList = JSON.parse(localStorage.getItem('unList')) || [];

    // 運を追加する関数
    function addUn() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const timeString = `${month}/${date} ${hours}:${minutes}`;
        
        // 過去のデータに新しい運を「追加」する（上書きしない）
        unList.push(timeString);
        localStorage.setItem('unList', JSON.stringify(unList));
    }

    // 画面に運の一覧を表示する関数
    function renderUnList() {
        unGrid.innerHTML = "";
        unList.forEach(time => {
            const item = document.createElement('div');
            item.className = 'un-item';
            item.innerHTML = `
                <div class="un-circle">運</div>
                <div class="un-date">${time}</div>
            `;
            unGrid.appendChild(item);
        });
    }

    // データを全部消す関数
    function clearUn() {
        if(confirm("貯まった運をすべてリセットしますか？")) {
            localStorage.removeItem('unList');
            unList = [];
            renderUnList();
        }
    }

    // 動かす
    addUn();         // 読み込むたびに1個増える
    renderUnList();  // 増えた状態の一覧を表示する
</script>

</body>
</html>
